<!DOCTYPE html>
<html lang="ja">
<head>
  <title>列車時刻表・運行情報</title>
  <meta charset="UTF-8" />
  <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
    }

    .carousel-container {
      position: relative;
      width: 100dvw;
      height: 245dvw;
      overflow: hidden;
      margin: auto;
      margin-top: 0;
    }

    .slides {
      display: flex;
      width: 200%;
      height: 90%;
      transition: transform 0.5s ease;
    }

    .slide {
      width: 50%;
      height: 100%;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide img {
      width: 100%;
      object-fit: contain;
      display: block;
    }

    input[name="carousel"] {
      display: none;
    }

    #slide1:checked ~ .carousel-container .slides { transform: translateX(0%); }
    #slide2:checked ~ .carousel-container .slides { transform: translateX(-50%); }


    .arrow {
      position: fixed;
      top: 50vh;
      transform: translateY(-50%);
      font-size: 2rem;
      color: white;
      padding: 10px;
      cursor: pointer;
      z-index: 1;
      display: none;
      opacity: 0.5;
    }
    .arrow:hover{
      opacity:1.0;
    }

    .prev {
      left: -5px;
      }
    .next {
      right: -5px;
      }

    .arrow img {
      height: 60px;
    }

    #slide1:checked ~ .carousel-container label[for="slide2"].prev,
    #slide1:checked ~ .carousel-container label[for="slide2"].next,
    #slide2:checked ~ .carousel-container label[for="slide1"].prev,
    #slide2:checked ~ .carousel-container label[for="slide1"].next {
      display: block;
    }

    .nav-buttons {
      text-align: center;
      margin-top: 10px;
    }

    .nav-buttons label {
      cursor: pointer;
      font-size: 1.5rem;
      padding: 0 5px;
      color: #9e9e9e;
    }

    #slide1:checked ~ .nav-buttons label[for="slide1"],
    #slide2:checked ~ .nav-buttons label[for="slide2"],{
      color: #000000;
    }

    .url {
      text-align: center;
      font-family: Noto Sans JP;
      height: 10vw;
    }

    .url p{
      font-size: 1.5rem;
    }

    .url a {
       text-decoration: none;
       color: #0000ff;
    }

    @media (max-width: 600px) {
      .arrow {
        font-size: 1.5rem;
        padding: 5px;
      }

      .nav-buttons label {
        font-size: 1rem;
      }
    }
    .iframe {
      height: 25dvh;
      width: 100dvwvw;
      overflow: hidden;
    }
    .iframe iframe {
      width: 100%;
      height: calc(50vh + 100px);
      margin-top: -100px;
    }
    h2 {
      position: relative;
      background-color: #FFFF00;
    }
  </style>
</head>
<body>
<script type="text/javascript">
<!--
//時間帯で画像の表示切り替え
var now = new Date();
var time = now.getHours() + now.getMinutes() * 0.01;
if(time >= 0 && time <= 15.04){
document.write('  <input type="radio" name="carousel" id="slide1" checked>');
}
if(time >= 23.42 && time <= 23.59){
document.write('  <input type="radio" name="carousel" id="slide1" checked>');
}
else{
document.write('  <input type="radio" name="carousel" id="slide1">');
}
// -->
</script>
<script type="text/javascript">
<!--
//時間帯で画像の表示切り替え
var now = new Date();
var time = now.getHours() + now.getMinutes() * 0.01;
if(time >= 15.05 && time <= 23.41){
document.write('  <input type="radio" name="carousel" id="slide2" checked>');
}
else{
document.write('  <input type="radio" name="carousel" id="slide2">');
}
// -->
</script>
  <div class="iframe">
    <iframe src="https://www.jrkyushu.co.jp/trains/info/oita.html#ota"></iframe>
  </div>
  <h2> 2026年5月31日(日)に、2026年3月のダイヤ改正に対応した時刻表に変更しました！遅くなってしまい、すみませんでした💦</h2><h2>バグ・要望などがあればご連絡ください！</h2>
  <div class="carousel-container">
    <div class="slides">
      <div class="slide"><img src="https://moriwakiren-fucc.github.io/train-info/timetable/timetable_img/001.JPG"></div>
      <div class="slide"><img src="https://moriwakiren-fucc.github.io/train-info/timetable/timetable_img/002.JPG"></div>
    </div>

    <label class="arrow prev" for="slide2"><img src="https://moriwakiren-fucc.github.io/train-info/icon/prev.png"></label>
    <label class="arrow next" for="slide2"><img src="https://moriwakiren-fucc.github.io/train-info/icon/next.png"></label>
    <label class="arrow prev" for="slide1"><img src="https://moriwakiren-fucc.github.io/train-info/icon/prev.png"></label>
    <label class="arrow next" for="slide1"><img src="https://moriwakiren-fucc.github.io/train-info/icon/next.png"></label>
  </div>

  <div class="nav-buttons">
    <label for="slide1">●</label>
    <label for="slide2">●</label>

  </div>

  <div class="url">
    <p><a href="https://moriwakiren-fucc.github.io/train-info/timetable/timetable.pdf">PDF形式はこちら</a></p>
  </div>
</body>
</html>
